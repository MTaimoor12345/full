name: SportsStore CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore SportsSln.sln

    - name: Build
      run: dotnet build SportsSln.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test SportsSln.sln --no-build --configuration Release --verbosity normal --logger "trx" --collect:"XPlat Code Coverage"

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/*.trx'

    - name: Upload Coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-coverage
        path: '**/coverage.cobertura.xml'

    - name: Publish OrderAPI
      run: dotnet publish SportsStore.OrderAPI/SportsStore.OrderAPI.csproj -c Release -o ./publish/orderapi

    - name: Publish InventoryService
      run: dotnet publish SportsStore.InventoryService/SportsStore.InventoryService.csproj -c Release -o ./publish/inventory

    - name: Publish PaymentService
      run: dotnet publish SportsStore.PaymentService/SportsStore.PaymentService.csproj -c Release -o ./publish/payment

    - name: Publish ShippingService
      run: dotnet publish SportsStore.ShippingService/SportsStore.ShippingService.csproj -c Release -o ./publish/shipping

    - name: Publish Blazor
      run: dotnet publish SportsStore.Blazor/SportsStore.Blazor.csproj -c Release -o ./publish/blazor

    - name: Build React Admin
      working-directory: SportsStore.Admin
      run: |
        npm ci
        npm run build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: published-apps
        path: ./publish/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      if: github.event_name != 'pull_request'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set lowercase repository owner
      id: repo_owner
      run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Build Single Container Image (All-in-One)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.single
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/sportsstore:latest
          ${{ secrets.DOCKER_USERNAME }}/sportsstore:${{ github.sha }}
          ghcr.io/${{ env.OWNER_LC }}/sportsstore:latest
          ghcr.io/${{ env.OWNER_LC }}/sportsstore:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Integration tests temporarily disabled - need database seeding and Stripe config
  # integration-tests:
  #   runs-on: ubuntu-latest
  #   needs: build-and-test
  #   ...
