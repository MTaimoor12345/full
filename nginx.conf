# React Admin - Port 3000
server {
    listen 3000;
    root /var/www/html/admin;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # All API calls go through OrderAPI (which has proxy controllers)
    location /api/ {
        proxy_pass http://localhost:5138/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Blazor Customer Portal - Port 5187
server {
    listen 5187;
    root /var/www/html/blazor;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # API calls for Blazor
    location /api/ {
        proxy_pass http://localhost:5138/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
